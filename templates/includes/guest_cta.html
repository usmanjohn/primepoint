{% load i18n %}
{% if not user.is_authenticated %}
<div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2 gap-sm-3 mb-4 p-3 rounded-4"
     style="background:var(--surface-2); border:1.5px dashed var(--border);">
    <div style="font-size:1.5rem; line-height:1;">&#x1F43C;</div>
    <div class="flex-grow-1" style="color:var(--text-muted); font-size:0.88rem;">
        <strong style="color:var(--text);">{% trans "You're browsing as a guest." %}</strong>
        {% trans "Everything here is free to try — sign up to save your progress, earn points and get homework from teachers." %}
    </div>
    <div class="d-flex gap-2 flex-shrink-0">
        <a href="{% url 'login' %}?next={{ request.path|urlencode }}" class="btn-auth-outline">{% trans "Log in" %}</a>
        <a href="{% url 'register' %}" class="btn-auth-primary">{% trans "Sign up free" %}</a>
    </div>
</div>
{% endif %}
