[build]
builder = "NIXPACKS"
buildCommand = "python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && (python manage.py attach_exam_audio 101 exam/data/audio/mock1_listening.mp3 || true) && (python manage.py attach_exam_audio 102 exam/data/audio/mock2_listening.mp3 || true) && (python manage.py attach_exam_audio 103 exam/data/audio/mock3_listening.mp3 || true) && gunicorn point.wsgi --workers 3 --timeout 120 --preload --bind 0.0.0.0:$PORT"
