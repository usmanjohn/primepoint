{% extends 'base.html' %}

{% block title %}Password Updated — Powerty{% endblock %}
{% block page_name %}Password Changed{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="card">
            <div class="auth-body text-center">

                <div class="success-icon">
                    <i class="bi bi-shield-check"></i>
                </div>

                <h1 class="auth-title">Password updated!</h1>
                <p class="auth-subtitle mt-1">Your password has been changed successfully. You're all set.</p>

                <a href="{% url 'profile' %}" class="btn-submit" style="margin-top: 2rem; text-decoration: none;">
                    <i class="bi bi-person-circle"></i> Back to Profile
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
