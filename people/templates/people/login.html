{% extends 'base.html' %}

{% block content %}

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    
    <!-- This renders the username and password fields -->
    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
{% endblock content %}
