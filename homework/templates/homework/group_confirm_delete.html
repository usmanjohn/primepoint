{% extends 'base.html' %}

{% block nav_homework %}active{% endblock %}
{% block title %}Delete Group — CORE{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card border-0 shadow-sm p-4 mt-4" style="background: var(--surface);">
        <div class="text-center mb-3">
          <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
        </div>
        <h4 class="text-center mb-1" style="font-family: 'Syne', sans-serif;">Delete Group?</h4>
        <p class="text-center text-muted mb-4" style="font-size:0.88rem;">
          The group "<strong>{{ group.name }}</strong>" will be deleted. Students in this group are not affected.
        </p>
        <form method="post" class="d-flex flex-column gap-2">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger py-2">Yes, Delete</button>
          <a href="{% url 'manage_groups' %}" class="btn-auth-outline py-2 text-decoration-none text-center d-block">Cancel</a>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
