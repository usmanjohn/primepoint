{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Our Masters</h1>
        <a href="{% url 'masters-create' %}" class="btn btn-primary">+ Add New Master</a>
    </div>

    <div class="row">
        {% for master in masters %}
            <div class="col-md-4 mb-3">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ master.name }}</h5>
                        <p class="text-muted small">{{ master.subject }}</p>
                        <p class="card-text text-truncate">{{ master.description }}</p>
                        <a href="{% url 'masters-detail' master.id %}" class="btn btn-sm btn-outline-primary">View Details</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <p>No masters found. Be the first to create one!</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
