{% extends "base.html" %}
{% block content %}
<h2>Available Practices</h2>
<ul>
    {% for p in practices %}
        <li>
            <strong>{{ p.get_type_display }}</strong>: 
            <a href="{% url 'practice-start' p.pk %}">{{ p.title }}</a> 
            ({{ p.level }})
        </li>
    {% endfor %}
</ul>
{% endblock %}
